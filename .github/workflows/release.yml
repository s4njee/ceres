name: Release

# Builds distributable artifacts on every version tag (and on demand):
#   - macOS:   Ceres-macOS.zip          (deployed .app, zipped)
#   - Windows: Ceres-Windows-Setup.exe  (NSIS installer)
#   - Linux:   Ceres-x86_64.AppImage    (self-contained, via linuxdeploy)
# On a tag push (v*) the artifacts are also attached to a GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  QT_VERSION: "6.7.2"

jobs:
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --target ceres
      - name: Deploy + zip the app bundle
        run: |
          cmake --install build --prefix dist
          ditto -c -k --keepParent dist/ceres.app Ceres-macOS.zip
      - uses: actions/upload-artifact@v4
        with:
          name: Ceres-macOS
          path: Ceres-macOS.zip
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Ceres-macOS.zip

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Install NSIS
        run: choco install nsis -y --no-progress
      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --config Release --target ceres
      - name: Package (NSIS installer)
        working-directory: build
        run: cpack -G NSIS -C Release
      - name: Collect installer
        shell: bash
        run: cp build/Ceres-*.exe Ceres-Windows-Setup.exe
      - uses: actions/upload-artifact@v4
        with:
          name: Ceres-Windows
          path: Ceres-Windows-Setup.exe
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Ceres-Windows-Setup.exe

  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: System build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libgl1-mesa-dev libxkbcommon-dev \
            libfuse2 libxcb-cursor0
      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: ${{ env.QT_VERSION }}
          cache: true
      - name: Configure + build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build --target ceres
      - name: Stage AppDir
        run: cmake --install build --prefix AppDir/usr
      - name: Build AppImage
        run: |
          curl -fsSLO https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          curl -fsSLO https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy*.AppImage
          export QML_SOURCES_PATHS="$PWD/qml"
          ./linuxdeploy-x86_64.AppImage --appdir AppDir \
            --executable AppDir/usr/bin/ceres \
            --desktop-file AppDir/usr/share/applications/ceres.desktop \
            --icon-file AppDir/usr/share/icons/hicolor/256x256/apps/ceres.png \
            --plugin qt --output appimage
          mv Ceres*.AppImage Ceres-x86_64.AppImage
      - uses: actions/upload-artifact@v4
        with:
          name: Ceres-Linux
          path: Ceres-x86_64.AppImage
      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Ceres-x86_64.AppImage
